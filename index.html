<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中華健言社100期會外會報名</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei","PingFang TC",sans-serif;
}

body{
    background:#fff7f1;
    padding:20px;
    color:#444;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    color:#f57c00;
    font-size:28px;
    text-align:center;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#666;
    line-height:1.8;
    margin-bottom:25px;
}

.info{
    background:#fff3e0;
    border-left:5px solid #ff9800;
    padding:15px;
    border-radius:10px;
    margin-bottom:25px;
    line-height:1.8;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#555;
}

input,
select{
    width:100%;
    padding:13px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:18px;
    font-size:16px;
    background:#fff;
}

input:focus,
select:focus{
    outline:none;
    border-color:#ff9800;
}

.note{
    color:#888;
    font-size:13px;
    margin-top:-12px;
    margin-bottom:15px;
}

.birth-row{
    display:flex;
    gap:10px;
    margin-bottom:18px;
}

.birth-row select{
    margin-bottom:0;
}

.radio-group{
    display:flex;
    gap:25px;
    margin-bottom:25px;
}

.radio-group label{
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:normal;
}

.radio-group input{
    width:auto;
    margin:0;
}

button{
    width:100%;
    background:#ff9800;
    color:#fff;
    border:none;
    padding:16px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#f57c00;
}

.footer{
    text-align:center;
    color:#999;
    margin-top:20px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>🍊 中華健言社</h1>

<div class="subtitle">
100期會外會活動報名
</div>

<div class="info">
📅 <b>日期：</b>2026/10/10（六）09:00–16:00<br><br>

📍 <b>地點：</b>新城風糖休閒園區<br><br>

💰 <b>費用：</b><br>
會員 550 元<br>
非會員 700 元（含保險）
</div>

<form>

<label>姓名</label>
<input type="text" required>

<label>手機</label>
<input type="tel" required>

<label>出生年月日</label>
<div class="birth-row">
    <select id="birthYear" required>
        <option value="">年</option>
    </select>

    <select id="birthMonth" required>
        <option value="">月</option>
    </select>

    <select id="birthDay" required>
        <option value="">日</option>
    </select>
</div>

<label>身分證字號</label>
<input type="text" required>

<div class="note">
※ 僅供保險投保使用
</div>

<label>所屬社團</label>

<select required>
    <option value="">請選擇</option>
    <option>諄言社</option>
    <option>三重社</option>
    <option>三峽社</option>
    <option>鶯歌社</option>
    <option>竹北社</option>
    <option>新竹社</option>
    <option>中壢社</option>
    <option>湖口社</option>
</select>

<label>餐點</label>

<div class="radio-group">
    <label><input type="radio" name="meal" value="葷食" required> 葷食</label>
    <label><input type="radio" name="meal" value="素食"> 素食</label>
</div>

<button type="submit">
立即報名
</button>

</form>

<div class="footer">
中華健言社 100 期會外會
</div>

</div>

<script>
// 年份：1930～今年
const currentYear = new Date().getFullYear();
const yearSelect = document.getElementById("birthYear");

for(let y=currentYear; y>=1930; y--){
    let option=document.createElement("option");
    option.value=y;
    option.textContent=y+" 年";
    yearSelect.appendChild(option);
}

// 月份
const monthSelect=document.getElementById("birthMonth");

for(let m=1;m<=12;m++){
    let option=document.createElement("option");
    option.value=m;
    option.textContent=m+" 月";
    monthSelect.appendChild(option);
}

// 日期
const daySelect=document.getElementById("birthDay");

for(let d=1;d<=31;d++){
    let option=document.createElement("option");
    option.value=d;
    option.textContent=d+" 日";
    daySelect.appendChild(option);
}
</script>

</body>
</html>
